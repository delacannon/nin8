name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxext-dev libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          PKG=NINEIGHT-${VERSION}-linux-x86_64
          mkdir -p dist/${PKG}
          cp -r build/Nineight_artefacts/Release/VST3/NINEIGHT.vst3 dist/${PKG}/
          cp build/Nineight_artefacts/Release/Standalone/NINEIGHT dist/${PKG}/
          cp README.md dist/${PKG}/
          tar -C dist -czf dist/${PKG}.tar.gz ${PKG}
          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: dist/${{ env.PKG }}.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PKG }}.tar.gz
          generate_release_notes: true
